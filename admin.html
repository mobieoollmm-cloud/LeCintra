<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Le Cintra</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <!-- Link to the main style.css -->
    <link rel="stylesheet" href="style.css" />
    <style>
        /* Additional overrides specific to the admin table */
        body {
            padding-top: 60px;
            padding-bottom: 60px;
        }
        .admin-container {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 3rem;
            box-shadow: var(--shadow);
            margin-top: 2rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 2rem;
            font-size: 0.9rem;
        }
        th, td {
            padding: 1.2rem 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        th {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--gold);
            font-weight: 600;
        }
        td {
            color: var(--text-primary);
        }
        td.muted {
            color: var(--text-muted);
        }
        tr:hover td {
            background: rgba(201, 162, 39, 0.05);
        }
        .loading {
            text-align: center;
            color: var(--text-muted);
            font-style: italic;
        }
        .error-msg {
            color: #e74c3c;
            text-align: center;
            margin-top: 2rem;
            font-weight: 500;
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 2rem;
        }
        .btn-refresh {
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="admin-container">
        <div class="admin-header">
            <div class="section-header" style="margin-bottom: 0; text-align: left;">
                <p class="section-label">Management</p>
                <h2 class="section-title">Reservations <em>Dashboard</em></h2>
            </div>
            <button class="btn-outline small btn-refresh" onclick="fetchReservations()">Refresh</button>
        </div>
        
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Phone</th>
                    <th>Date</th>
                    <th>Time</th>
                    <th>Guests</th>
                    <th>Booked On</th>
                </tr>
            </thead>
            <tbody id="table-body">
                <tr>
                    <td colspan="7" class="loading">Loading reservations...</td>
                </tr>
            </tbody>
        </table>
        <div id="error-message" class="error-msg"></div>
    </div>
</div>

<script>
    async function fetchReservations() {
        const tbody = document.getElementById('table-body');
        const errorMessage = document.getElementById('error-message');
        
        errorMessage.textContent = '';

        
        try {
            const response = await fetch('/api/reservations');
            if (!response.ok) {
                throw new Error('Failed to fetch data from the server.');
            }
            
            const data = await response.json();
            
            tbody.innerHTML = ''; // Clear loading message
            
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; color: var(--text-muted);">No reservations found yet.</td></tr>';
                return;
            }

            data.forEach(reservation => {
                const tr = document.createElement('tr');
                
                // Format the created_at date nicely
                const createdAt = new Date(reservation.created_at).toLocaleString();
                
                tr.innerHTML = `
                    <td class="muted">#${reservation.id}</td>
                    <td><strong>${escapeHtml(reservation.name)}</strong></td>
                    <td class="muted">${escapeHtml(reservation.phone)}</td>
                    <td>${escapeHtml(reservation.date)}</td>
                    <td>${escapeHtml(reservation.time)}</td>
                    <td>${reservation.guests}</td>
                    <td class="muted">${createdAt}</td>
                `;
                tbody.appendChild(tr);
            });
            
        } catch (error) {
            tbody.innerHTML = '';
            errorMessage.textContent = error.message || 'An error occurred while loading reservations.';
        }
    }

    // Helper function to prevent XSS
    function escapeHtml(unsafe) {
        return (unsafe || '').toString()
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }

    // Load data on page load
    window.addEventListener('DOMContentLoaded', () => {
        fetchReservations();
        // Auto refresh every 5 seconds
        setInterval(fetchReservations, 5000);
    });
</script>

</body>
</html>
